<svg width="100%" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="quoteGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d4628;stop-opacity:0.08" />
      <stop offset="25%" style="stop-color:#6b8e23;stop-opacity:0.06" />
      <stop offset="50%" style="stop-color:#bfa37e;stop-opacity:0.04" />
      <stop offset="75%" style="stop-color:#6b8e23;stop-opacity:0.06" />
      <stop offset="100%" style="stop-color:#2d4628;stop-opacity:0.08" />
    </linearGradient>
    
    <pattern id="quotePattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#2d4628" opacity="0.08"/>
      <circle cx="80" cy="30" r="0.8" fill="#6b8e23" opacity="0.06"/>
      <circle cx="50" cy="70" r="1.2" fill="#bfa37e" opacity="0.04"/>
      <circle cx="30" cy="80" r="0.6" fill="#2d4628" opacity="0.08"/>
      <circle cx="70" cy="60" r="0.9" fill="#6b8e23" opacity="0.06"/>
    </pattern>
  </defs>
  
  <!-- Fondo principal -->
  <rect width="100%" height="100%" fill="url(#quoteGradient)"/>
  
  <!-- Patrón decorativo -->
  <rect width="100%" height="100%" fill="url(#quotePattern)"/>
  
  <!-- Elementos decorativos adicionales -->
  <path d="M0,100 Q300,50 600,100 T1200,100" stroke="#2d4628" stroke-width="0.5" fill="none" opacity="0.08"/>
  <path d="M0,120 Q400,80 800,120 T1200,120" stroke="#6b8e23" stroke-width="0.3" fill="none" opacity="0.06"/>
  <path d="M0,80 Q200,60 400,80 T800,80 T1200,80" stroke="#bfa37e" stroke-width="0.4" fill="none" opacity="0.04"/>
  
  <!-- Puntos decorativos -->
  <circle cx="100" cy="50" r="2" fill="#2d4628" opacity="0.08"/>
  <circle cx="300" cy="150" r="1.5" fill="#6b8e23" opacity="0.06"/>
  <circle cx="500" cy="40" r="1.8" fill="#bfa37e" opacity="0.04"/>
  <circle cx="700" cy="160" r="1.2" fill="#2d4628" opacity="0.08"/>
  <circle cx="900" cy="60" r="2.2" fill="#6b8e23" opacity="0.06"/>
  <circle cx="1100" cy="140" r="1.6" fill="#bfa37e" opacity="0.04"/>
</svg>