<svg width="100%" height="120" viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d4628;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#6b8e23;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#bfa37e;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Patrón de borde decorativo -->
  <path d="M0,60 Q150,20 300,60 T600,60 T900,60 T1200,60 L1200,120 L0,120 Z" 
