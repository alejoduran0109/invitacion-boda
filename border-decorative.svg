  <circle cx="1000" cy="42" r="3.5" fill="#6b8e23" opacity="0.3"/>
  
  <!-- Líneas decorativas -->
  <path d="M100,30 Q150,50 200,30" stroke="#2d4628" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M500,35 Q550,55 600,35" stroke="#6b8e23" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M700,40 Q750,60 800,40" stroke="#bfa37e" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M900,32 Q950,52 1000,32" stroke="#2d4628" stroke-width="1" fill="none" opacity="0.2"/>
